# security-test-plan.iso27001.yaml
# ISO/IEC 27001:2013 Annex A — firewall-relevant controls catalogue fragment
# (Stream B3)
#
# References:
#   ISO/IEC 27001:2013 Annex A
#   ISO/IEC 27002:2013 implementation guidance
#
# Controls covered: A.12 Operations, A.13 Communications, A.18 Compliance.
# Personnel (A.7), physical (A.11), access management (A.9), and asset
# management (A.8) are explicitly out of scope — see out_of_scope section.
#
# status: covered | partial | out_of_scope

standard: iso-27001
standard_title: "ISO/IEC 27001:2013 Annex A"
standard_url: "https://www.iso.org/standard/54534.html"

tests:

  - test_id: iso27001-a-13-1-1-network-controls
    standard_refs: ["iso27001/A.13.1.1", "owasp/FW-3"]
    title: "Network controls (segmentation and access policy)"
    status: covered
    description: >
      Verify that networks are segregated into security zones and that
      inter-zone traffic is controlled by an explicit, default-deny policy.
      The compiled nftables ruleset enforces zone policies; rule_scan probes
      confirm that every non-permitted zone pair is dropped.
    maps_to_scenario:
      kind: rule_scan
      source_role: wan-uplink
      random_count: 500
    acceptance_criteria:
      fail_accept_count: 0
      zone_pair_coverage_pct: 100
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-13-1-1-network-controls"
      machine: "audit.json scenarios[].test_id == iso27001-a-13-1-1-network-controls"
    tags: [network-controls, zone-segmentation, default-deny]

  - test_id: iso27001-a-13-1-2-network-service-security
    standard_refs: ["iso27001/A.13.1.2"]
    title: "Security of network services (partial — SLA proxy via throughput)"
    status: partial
    partial_reason: >
      Service-level protocol SLA (e.g., guaranteed bandwidth or latency per
      service class) is not separately validated.  throughput + latency
      scenarios provide proxy evidence that the firewall does not degrade
      service quality beyond acceptable bounds, but formal SLA verification
      requires per-service traffic shaping policy, which is not in scope.
    maps_to_scenario:
      kind: throughput
      source_role: wan-uplink
      sink_role: lan-downstream
    acceptance_criteria:
      throughput_degradation_pct: "<= 5"
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-13-1-2-network-service-security"
      machine: "audit.json scenarios[].test_id == iso27001-a-13-1-2-network-service-security"
    tags: [network-services, throughput, partial]

  - test_id: iso27001-a-13-1-3-network-segregation
    standard_refs: ["iso27001/A.13.1.3", "owasp/FW-2"]
    title: "Segregation of networks (zone-pair exhaustion)"
    status: covered
    description: >
      Exhaustively enumerate every zone-pair combination and confirm that
      each pair is either explicitly permitted or explicitly blocked.  No
      implicit reachability must exist between security zones.
      rule_coverage_matrix drives this check: it iterates all (src, dst)
      zone pairs, sends test traffic, and compares observed nft counter
      increments against the expected policy.
    maps_to_scenario:
      kind: rule_coverage_matrix
      source_role: wan-uplink
    acceptance_criteria:
      implicit_accept_zone_pairs: 0
      uncovered_zone_pairs: 0
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-13-1-3-network-segregation"
      machine: "audit.json scenarios[].test_id == iso27001-a-13-1-3-network-segregation"
    tags: [network-segregation, zone-pairs, coverage]

  - test_id: iso27001-a-12-4-1-event-logging
    standard_refs: ["iso27001/A.12.4.1"]
    title: "Event logging (partial — Prometheus counters; no per-packet syslog)"
    status: partial
    partial_reason: >
      Prometheus counters provide near-real-time aggregate metrics (packets,
      bytes, connection rate, drop count) via shorewalld.  However, there is
      no per-packet drop log, no central SIEM integration, and no CEF/syslog
      export.  This represents a partial implementation of A.12.4.1.  Full
      compliance requires a per-packet logging pipeline (tracked as a
      separate shorewalld task in CLAUDE.md).
    maps_to_scenario:
      kind: rule_coverage_matrix
      source_role: wan-uplink
      # Prometheus scrape is verified as part of the metrics-ingest path.
    acceptance_criteria:
      prometheus_scrape_ok: true
      nft_counter_gap_s: "<= 30"
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-12-4-1-event-logging"
      machine: "audit.json scenarios[].test_id == iso27001-a-12-4-1-event-logging"
    tags: [logging, prometheus, partial]

  - test_id: iso27001-a-12-6-1-vuln-management
    standard_refs: ["iso27001/A.12.6.1"]
    title: "Technical vulnerability management (advisor tier-B/C review PRs)"
    status: partial
    partial_reason: >
      Advisor tier-B/C recommendations are automatically opened as PRs via
      `stagelab review`, providing a structured workflow for addressing
      firewall-configuration vulnerabilities.  No automated CVE feed or
      package-vulnerability scanner is integrated.  This covers the
      configuration-drift aspect of A.12.6.1 but not the software-CVE aspect.
    maps_to_scenario:
      kind: rule_coverage_matrix
      source_role: wan-uplink
    acceptance_criteria:
      advisor_tier_b_pr_created: true
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-12-6-1-vuln-management"
      machine: "audit.json scenarios[].test_id == iso27001-a-12-6-1-vuln-management"
    tags: [vuln-management, advisor, review, partial]

  - test_id: iso27001-a-18-2-1-security-review
    standard_refs: ["iso27001/A.18.2.1"]
    title: "Independent review of information security (stagelab audit report)"
    status: covered
    description: >
      `stagelab audit` aggregates evidence from all scenario runs
      (run.json files), renders a signed HTML/PDF audit report with
      per-scenario pass/fail verdicts, advisor recommendations, and
      rule-coverage heat-map.  The report is suitable for submission
      to an independent reviewer or compliance auditor.
    maps_to_scenario:
      kind: rule_coverage_matrix
      source_role: wan-uplink
      # audit is the post-processing step over all scenario results.
    acceptance_criteria:
      audit_html_generated: true
      audit_json_generated: true
      overall_pass: true
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-18-2-1-security-review"
      machine: "audit.json scenarios[].test_id == iso27001-a-18-2-1-security-review"
    tags: [audit, compliance-review, evidence]

  - test_id: iso27001-a-18-2-2-policy-compliance
    standard_refs: ["iso27001/A.18.2.2", "owasp/FW-8"]
    title: "Compliance with security policies (test plan as policy instrument)"
    status: covered
    description: >
      This test plan itself is the policy instrument: running
      `tools/run-security-test-plan.sh` executes all catalogue entries,
      enforces acceptance criteria, and exits non-zero on any failure.
      Regular execution (scheduled or on every ruleset change) implements
      continuous compliance checking against the documented security policy.
    maps_to_scenario:
      kind: reload_atomicity
      source_role: wan-uplink
      sink_role: lan-downstream
      # reload_atomicity is the sentinel that the full policy-enforcement
      # pipeline (compile → load → verify) is functional.
    acceptance_criteria:
      run_exit_code: 0
      acceptance_criteria_failures: 0
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-18-2-2-policy-compliance"
      machine: "audit.json scenarios[].test_id == iso27001-a-18-2-2-policy-compliance"
    tags: [policy-compliance, executor, continuous]

  - test_id: iso27001-a-13-2-1-transfer-controls
    standard_refs: ["iso27001/A.13.2.1"]
    title: "Information transfer controls (zone-pair data-flow enforcement)"
    status: covered
    description: >
      Verify that zone-pair rules restrict data flows to those explicitly
      permitted by the security policy, preventing unauthorised lateral
      movement or data exfiltration paths.  Validated by rule_scan
      (random probes on non-permitted paths) and rule_coverage_matrix
      (systematic enumeration of all flow directions).
    maps_to_scenario:
      kind: rule_scan
      source_role: wan-uplink
      random_count: 500
    acceptance_criteria:
      fail_accept_count: 0
    evidence:
      human: "docs/testing/security-test-plan.md#iso27001-a-13-2-1-transfer-controls"
      machine: "audit.json scenarios[].test_id == iso27001-a-13-2-1-transfer-controls"
    tags: [data-transfer, lateral-movement, zone-policy]

out_of_scope:
  - id: iso27001-a-12-4-3-admin-activity
    control: "A.12.4.3"
    reason: >
      Administrator and operator activity logs are OS-level controls
      (auditd, sshd AuthorizedKeysFile logs).  Not a firewall ruleset test.

  - id: iso27001-a-18-1-3-records-protection
    control: "A.18.1.3"
    reason: >
      Records protection is a data-retention and organisational policy
      control.  Outside firewall scope.

  - id: iso27001-a-7-personnel
    control: "A.7"
    reason: >
      Human resource security (vetting, contracts, disciplinary process)
      is an HR/organisational control, not a firewall test.

  - id: iso27001-a-8-asset-management
    control: "A.8"
    reason: >
      Asset management and classification is an inventory/governance
      control, not a firewall test.

  - id: iso27001-a-9-access-control
    control: "A.9"
    reason: >
      Identity and authentication management (IAM, MFA, privilege review)
      is not directly tested by firewall scenarios; the firewall enforces
      network-layer access policy only.

  - id: iso27001-a-11-physical
    control: "A.11"
    reason: >
      Physical and environmental security (data-centre access, cabling,
      power) is not a firewall test.
