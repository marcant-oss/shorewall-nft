    '
out_of_scope:
- standard: cc-iso-15408
  sfr_family: FCS_* (Cryptographic support)
  reason: 'Firewall is a stateless/stateful packet filter. TLS/IPsec crypto stack
    testing belongs to a separate component evaluation.

    '
- standard: cc-iso-15408
  sfr_family: ADV_* (Development)
  reason: 'Requires formal design documentation review and developer correspondence
    evidence. No test automation applies.

    '
- standard: cc-iso-15408
  sfr_family: ATE_* (Tests)
  reason: 'Meta-level; covered by the existence of this framework, not by individual
    scenarios.

    '
- standard: cc-iso-15408
  sfr_family: FIA_* (Identification and authentication)
  reason: 'Management-plane concern. The firewall does not authenticate forwarded
    flows.

    '
- standard: cc-iso-15408
  sfr_family: FTP_ITC.1 (Inter-TSF channel)
  reason: 'VPN/IPsec between trust domains is not in scope for the packet-filter test
    plan.

    '
- standard: cc-iso-15408
  sfr_family: FPT_STM.1 (Reliable timestamps)
  reason: 'NTP synchronisation is an OS/kernel concern; not tested here.

    '
- standard: cc-iso-15408
  sfr_family: AGD_* (Guidance documents)
  reason: Documentation review; not automated.
- standard: cc-iso-15408
  sfr_family: ALC_* (Lifecycle support)
  reason: Supply-chain and process concerns; not testable with this framework.
- standard: nist-800-53
  control_family: SC-6 (Resource Availability)
  reason: 'Kernel-level resource partitioning (cgroups, CPU pinning) is a platform
    concern. Partially addressed by the advisor tuning_sweep heuristic.

    '
- standard: nist-800-53
  control_family: IA-* (Identification and Authentication)
  reason: Management-plane authentication; firewall does not authenticate forwarded
    flows.
- standard: nist-800-53
  control_family: CM-* (Configuration Management)
  reason: Organisational configuration change control process; not automatable.
- standard: nist-800-53
  control_family: AT-*, PS-* (Awareness and Training / Personnel Security)
  reason: Personnel controls; not testable by this framework.
- standard: nist-800-53
  control_family: PE-* (Physical and Environmental Protection)
  reason: Data-centre physical access controls; outside scope.
- standard: nist-800-53
  control_family: SC-8 (Transmission Confidentiality and Integrity)
  reason: TLS/MACsec crypto stack testing is a separate component concern.
- standard: nist-800-53
  control_family: SC-28 (Protection of Information at Rest)
  reason: Disk encryption; outside scope of packet-filter testing.
- standard: nist-800-53
  control_family: AU-9 / AU-10 (Audit Protection / Non-repudiation)
  reason: 'Requires an independent audit store. Prometheus counters live on the firewall
    node itself; dedicated SIEM integration is a separate task.

    '
- standard: nist-800-53
  control_family: CA-*, RA-* (Assessment and Risk Management)
  reason: Organisational risk processes; not automatable here.
- standard: bsi-grundschutz
  test_id: bsi-net-3-2-a9-time-sync
  control: NET.3.2.A9
  reason: 'NTP time synchronisation is a system-level concern handled by the OS (chrony/ntpd).  shorewall-nft
    does not configure or test NTP; the control is out of scope for firewall rule
    testing.

    '
- standard: bsi-grundschutz
  test_id: bsi-net-1-1-a1-arch-doc
  control: NET.1.1.A1
  reason: 'Network architecture documentation is a governance/design artefact. Automated
    testing cannot verify completeness of documentation. The shorewall-nft configuration
    files are the machine-readable architecture record; human review is required for
    NET.1.1.A1.

    '
- standard: bsi-grundschutz
  control: NET.3.2.A3
  reason: 'Physical network port security (switch port hardening) is out of scope
    for a software firewall test suite.

    '
- standard: bsi-grundschutz
  control: NET.3.2.A8
  reason: 'VPN termination and PKI are handled by external components (OpenVPN, WireGuard).  Firewall
    rules permit VPN traffic but do not perform cryptographic validation — out of
    scope.

    '
- standard: bsi-grundschutz
  control: NET.3.2.A11
  reason: 'Remote administration channel hardening is an SSH server configuration
    concern, not a firewall rule concern.  Out of scope.

    '
- standard: cis-benchmarks
  test_id: cis-5-3-loopback-rules
  control: '5.3'
  reason: 'CIS 5.3 requires loopback interface rules (accept all lo traffic, drop
    lo-source from non-lo).  These are system-hardening rules that belong in the OS
    firewall configuration, not in the shorewall-nft firewall-rule test suite.  Verified
    as a one-time configuration audit item, not by repeated stagelab runs.

    '
- standard: cis-benchmarks
  test_id: cis-3-5-uncommon-protocols
  control: '3.5'
  reason: 'Disabling uncommon protocols (DCCP/SCTP) is a kernel module configuration
    task (modprobe.d blacklist).  Not a firewall rule concern; out of scope for shorewall-nft
    testing.

    '
- standard: cis-benchmarks
  test_id: cis-3-x-network-params
  control: 3.x
  reason: 'CIS Section 3 network parameters (ip_forward, send_redirects, accept_source_route,
    etc.) are kernel sysctl settings.  Applied at boot by sysctl.d; verified by a
    separate hardening audit tool.  Out of scope for the firewall-rule test suite.

    '
- standard: cis-benchmarks
  control: 6.x
  reason: 'CIS Section 6 (system hardening — auditd, file integrity, PAM, etc.) is
    entirely out of scope for firewall testing.

    '
- standard: owasp
  id: owasp-tls-fingerprint
  reason: 'TLS fingerprint / protocol-downgrade evasion requires a TLS-aware proxy
    or DPI appliance.  nftables operates below the TLS layer; this control is out
    of scope for a stateless/stateful packet firewall.

    '
- standard: owasp
  id: owasp-fragment-reassembly-dos
  reason: 'Fragment-reassembly DoS (Teardrop / Rose) is handled by the Linux kernel
    before nftables sees the packet.  Effect is on the host stack, not the ruleset.  Tracked
    as a separate open item in CLAUDE.md.

    '
- standard: iso-27001
  id: iso27001-a-12-4-3-admin-activity
  control: A.12.4.3
  reason: 'Administrator and operator activity logs are OS-level controls (auditd,
    sshd AuthorizedKeysFile logs).  Not a firewall ruleset test.

    '
- standard: iso-27001
  id: iso27001-a-18-1-3-records-protection
  control: A.18.1.3
  reason: 'Records protection is a data-retention and organisational policy control.  Outside
    firewall scope.

    '
- standard: iso-27001
  id: iso27001-a-7-personnel
  control: A.7
  reason: 'Human resource security (vetting, contracts, disciplinary process) is an
    HR/organisational control, not a firewall test.

    '
- standard: iso-27001
  id: iso27001-a-8-asset-management
  control: A.8
  reason: 'Asset management and classification is an inventory/governance control,
    not a firewall test.

    '
- standard: iso-27001
  id: iso27001-a-9-access-control
  control: A.9
  reason: 'Identity and authentication management (IAM, MFA, privilege review) is
    not directly tested by firewall scenarios; the firewall enforces network-layer
    access policy only.

    '
- standard: iso-27001
  id: iso27001-a-11-physical
  control: A.11
  reason: 'Physical and environmental security (data-centre access, cabling, power)
    is not a firewall test.

    '
- standard: performance-ipv6
  item: IPv6-only transition / NAT64
  reason: 'The reference firewall is dual-stack; NAT64 is a separate appliance and
    not in scope for throughput parity tests.

    '
- standard: performance-ipv6
  item: IPv6 flow-label QoS
  reason: 'Flow-label based QoS is not a firewall-level concern and is deferred to
    the network-layer QoS test plan.

    '
- standard: performance-ipv6
  item: MLD (Multicast Listener Discovery)
  reason: 'MLD is handled by the CIS/OWASP protocol-stack test items; out of scope
    for throughput parity.

    '
