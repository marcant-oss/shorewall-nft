# Example plugins.conf for shorewall-nft
#
# Place this as /etc/shorewall/plugins.conf (or in your config dir of
# choice) to enable the built-in plugins. Each plugin reads its own
# configuration from plugins/<name>.toml in the same directory.
#
# Format: TOML 1.0, parsed with stdlib tomllib.
#
# Priority (set in plugins/<name>.toml) determines the order of
# lookups when multiple plugins can answer the same query. Higher
# priority is asked first. Built-in defaults:
#   netbox:  priority 100 (authoritative)
#   ip-info: priority 10  (pattern-based fallback)

[[plugins]]
name = "ip-info"
enabled = true

[[plugins]]
name = "netbox"
enabled = true
