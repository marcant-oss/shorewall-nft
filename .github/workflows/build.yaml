name: tests

on:
  push:
    branches: [main, master, shorewall-next, shorewall-nft-release]
    tags: ['v*']
  pull_request:
    branches: [main, master, shorewall-next, shorewall-nft-release]

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables iproute2

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e "packages/shorewall-nft-netkit[dev]" \
            -e "packages/shorewall-nft[dev]" \
            -e "packages/shorewalld[dev]" \
            -e "packages/shorewall-nft-simlab[dev]" \
            -e "packages/shorewall-nft-stagelab[dev]"

      - name: Run unit tests — core
        run: |
          pytest packages/shorewall-nft/tests/ -v \
            --ignore=packages/shorewall-nft/tests/test_cli_integration.py \
            --ignore=packages/shorewall-nft/tests/test_config_gen.py \
            --ignore=packages/shorewall-nft/tests/test_netns_routing.py

      - name: Run unit tests — shorewalld
        run: |
          pytest packages/shorewalld/tests/ -v

      - name: Run unit tests — simlab
        run: |
          pytest packages/shorewall-nft-simlab/tests/ -v

      - name: Run unit tests — stagelab
        run: |
          pytest packages/shorewall-nft-stagelab/tests/unit/ -v

      - name: Run stagelab controller + agent roundtrip (no root)
        run: |
          pytest \
            packages/shorewall-nft-stagelab/tests/integration/test_controller_local.py \
            packages/shorewall-nft-stagelab/tests/integration/test_agent_roundtrip.py \
            packages/shorewall-nft-stagelab/tests/integration/test_audit_cli.py \
            packages/shorewall-nft-stagelab/tests/integration/test_stress_many_scenarios.py \
            -v

      - name: Coverage (core + shorewalld)
        if: matrix.python-version == '3.12'
        run: |
          pytest \
            packages/shorewall-nft/tests/ \
            packages/shorewalld/tests/ \
            --ignore=packages/shorewall-nft/tests/test_cli_integration.py \
            --ignore=packages/shorewall-nft/tests/test_config_gen.py \
            --ignore=packages/shorewall-nft/tests/test_netns_routing.py \
            --cov=shorewall_nft \
            --cov=shorewalld \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration tests (netns)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables iproute2 util-linux python3-nftables

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e "packages/shorewall-nft-netkit[dev]" \
            -e "packages/shorewall-nft[dev]" \
            -e "packages/shorewall-nft-simlab[dev]" \
            -e "packages/shorewall-nft-stagelab[dev]"

      - name: Run integration tests (isolated namespace)
        timeout-minutes: 10
        run: |
          sudo env PATH="$PATH" tools/run-tests.sh \
            packages/shorewall-nft/tests/test_cli_integration.py \
            packages/shorewall-nft/tests/test_netns_routing.py \
            packages/shorewall-nft-stagelab/tests/integration/test_topology_bridge.py \
            packages/shorewall-nft-stagelab/tests/integration/test_agent_runtime.py \
            -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check \
            packages/shorewall-nft/shorewall_nft \
            packages/shorewall-nft/tests \
            packages/shorewalld/shorewalld \
            packages/shorewalld/tests \
            packages/shorewall-nft-simlab/shorewall_nft_simlab \
            packages/shorewall-nft-simlab/tests \
            packages/shorewall-nft-stagelab/shorewall_nft_stagelab \
            packages/shorewall-nft-stagelab/tests

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on tools/
        run: |
          # --severity=warning: info-level notes (SC1091 source-not-followed,
          # SC2029 ssh-client-side-expand) are informational-only and do not
          # indicate bugs in our scripts.
          # -x: follow sourced files that carry a `# shellcheck source=` directive
          # so variables consumed in lib/trex-install.sh are visible and don't
          # produce SC2034 false positives in the sourcing script.
          shellcheck --severity=warning -x \
            tools/run-tests.sh \
            tools/gen-rpm-spec.sh \
            tools/release.sh \
            tools/setup-remote-test-host.sh

  build:
    name: Build wheels
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build twine

      - name: Build wheels
        run: |
          python -m build packages/shorewall-nft    --outdir dist/
          python -m build packages/shorewalld       --outdir dist/
          python -m build packages/shorewall-nft-simlab --outdir dist/

      - name: Check
        run: twine check dist/*

      - name: Verify bundled macros (shorewall-nft wheel)
        run: |
          python -m zipfile -l dist/shorewall_nft-*.whl | grep -c 'data/macros/macro\.' \
            | awk '{ if ($1 < 100) { print "FAIL: only " $1 " macros in wheel"; exit 1 } \
                     else { print "OK: " $1 " macros bundled" } }'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shorewall-nft-dist
          path: dist/

  deb-build:
    name: Build .deb packages
    runs-on: ubuntu-latest
    needs: unit-tests
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential devscripts debhelper-compat dh-python \
            pybuild-plugin-pyproject \
            python3-all python3-build python3-installer \
            python3-setuptools python3-wheel python3-pip \
            lintian fakeroot

      - name: Stage debian/ directory
        run: |
          cp -a packaging/debian debian

      - name: Build source + binary packages
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p deb-out
          mv ../shorewall-nft*.deb ../shorewall-nft*.buildinfo ../shorewall-nft*.changes deb-out/ || true
          ls -la deb-out/

      - name: Lintian
        run: |
          lintian --no-tag-display-limit deb-out/*.deb || true

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shorewall-nft-deb
          path: deb-out/

  rpm-build:
    name: Build .rpm packages (${{ matrix.distro.name }})
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: fedora40
            image: fedora:40
            profile: fedora
            # Fedora 40 ships python3-click, python3-pyroute2 in base; no EPEL dance.
            enable_epel: ""
          - name: almalinux10
            image: almalinux:10
            profile: almalinux10
            # AL10 AppStream ships python3-protobuf 3.19.6 + python3-dns + python3-scapy,
            # but python3-click / python3-pyroute2 / python3-prometheus_client / python3-pytest
            # come from EPEL 10 (and pytest from CRB).
            enable_epel: "1"
    container:
      image: ${{ matrix.distro.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Generator needs tags + commit history for version/release derivation.
          fetch-depth: 0
          fetch-tags: true

      - name: Install build deps
        run: |
          set -eux
          if [ -n "${{ matrix.distro.enable_epel }}" ]; then
            dnf install -y dnf-plugins-core epel-release
            dnf config-manager --set-enabled crb
          fi
          dnf install -y --setopt=install_weak_deps=False \
            rpm-build rpmlint python3 python3-pip python3-setuptools \
            python3-wheel gcc make git perl-interpreter \
            python3-rpm-macros systemd-rpm-macros \
            python3-click python3-pyroute2

      - name: Mark checkout as safe for git (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate spec file
        run: |
          ./tools/gen-rpm-spec.sh --distro ${{ matrix.distro.profile }}
          echo "--- generated spec head ---"
          sed -n '1,40p' packaging/rpm/shorewall-nft.spec

      - name: Build source tarball
        run: |
          VERSION=$(awk '/^Version:/ {print $2; exit}' packaging/rpm/shorewall-nft.spec)
          echo "spec version: $VERSION"
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          tar --exclude-vcs --exclude='./.github' --exclude='./dist' \
              --exclude='./build' --exclude='./.venv' \
              --exclude='./__pycache__' --exclude='./*.egg-info' \
              --transform "s|^\./|shorewall-nft-${VERSION}/|" \
              -czf ~/rpmbuild/SOURCES/shorewall-nft-${VERSION}.tar.gz .
          cp packaging/rpm/shorewall-nft.spec ~/rpmbuild/SPECS/

      - name: Build RPM
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/shorewall-nft.spec || {
            echo "RPM build failed — collecting logs"
            find ~/rpmbuild -name '*.log' -exec cat {} \;
            exit 1
          }
          mkdir -p rpm-out
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} rpm-out/ \;
          ls -la rpm-out/

      - name: Rpmlint
        run: |
          rpmlint rpm-out/*.rpm || true

      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shorewall-nft-rpm-${{ matrix.distro.name }}
          path: rpm-out/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, deb-build, rpm-build, unit-tests, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: shorewall-nft-dist
          path: dist/

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: shorewall-nft-deb
          path: deb-out/

      - name: Download .rpm artifacts (all distros)
        uses: actions/download-artifact@v4
        with:
          pattern: shorewall-nft-rpm-*
          merge-multiple: true
          path: rpm-out/

      - name: Extract changelog section for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          awk -v tag="$TAG" '
            $0 ~ "^## \\["tag"\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $TAG" > release-notes.md
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: shorewall-nft ${{ steps.changelog.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            deb-out/*.deb
            deb-out/*.buildinfo
            deb-out/*.changes
            rpm-out/*.rpm
