[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shorewall-nft"
version = "1.5.2"
description = "nftables-native firewall compiler with Shorewall-compatible configuration"
requires-python = ">=3.11"
license = {text = "GPL-2.0-only"}
authors = [
    {name = "André Valentin", email = "avalentin@marcant.net"},
]
maintainers = [
    {name = "André Valentin", email = "avalentin@marcant.net"},
]
keywords = [
    "shorewall", "nftables", "nft", "firewall",
    "iptables", "netfilter", "ipv6", "dual-stack", "security",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: System Administrators",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: System :: Networking :: Firewalls",
]
dependencies = [
    "click>=8.0",
    "pyroute2>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
]

[project.urls]
Homepage = "https://github.com/shorewall-nft/shorewall-nft"
Repository = "https://github.com/shorewall-nft/shorewall-nft.git"
Issues = "https://github.com/shorewall-nft/shorewall-nft/issues"
Changelog = "https://github.com/shorewall-nft/shorewall-nft/blob/master/CHANGELOG.md"

[project.scripts]
shorewall-nft = "shorewall_nft.main:main"
shorewall-nft-migrate = "shorewall_nft.tools.migrate:migrate"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    "ignore:coroutine 'AsyncNetlinkSocket.setup_endpoint' was never awaited:RuntimeWarning",
]

[tool.setuptools.packages.find]
include = ["shorewall_nft*"]

[tool.setuptools.package-data]
shorewall_nft = [
    "data/macros/macro.*",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501", "E701", "E731", "E741", "F601", "F841"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402", "E702", "I001"]
