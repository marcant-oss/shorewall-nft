# Monorepo root — not an installable package.
# Each sub-package lives under packages/ and has its own pyproject.toml.
#
# Quick bootstrap:
#   pip install -e packages/shorewall-nft
#   pip install -e packages/shorewalld
#   pip install -e packages/shorewall-nft-simlab
#
# Or all at once (editable, development extras):
#   pip install -e 'packages/shorewall-nft[dev]' \
#               -e 'packages/shorewalld[dev]' \
#               -e 'packages/shorewall-nft-simlab[dev]'

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501", "E701", "E731", "E741", "F601", "F841"]

[tool.ruff.lint.per-file-ignores]
# Tests have unconventional import patterns (late imports, semicolons for
# module-level constants, mixed stdlib+local ordering) — mirror the ignores
# that each per-package pyproject.toml already applies to its own tests/.
"**/tests/**" = ["E402", "E702", "I001"]
# Generated protobuf stubs — not human-authored, ignore all style rules.
"packages/shorewalld/shorewalld/proto/*_pb2.py" = ["E", "F", "I"]
